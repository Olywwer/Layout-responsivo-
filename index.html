<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layout Responsivo</title>


</head>

<body>

<div class="container">

    <div class="section">
        <img src="https://picsum.photos/400/300" alt="Imagem 1">
    </div>

    <div class="section texto">
        <h2>Título do Conteúdo</h2>
        <p>
            Este é um exemplo de bloco de texto responsivo. O tamanho da fonte
            usa unidades relativas para garantir melhor adaptação em diferentes
            tamanhos de tela. Em telas maiores o layout aparece em linha, e em
            telas menores as seções ficam empilhadas verticalmente.
        </p>
    </div>

    <div class="section">
        <img src="https://picsum.photos/401/300" alt="Imagem 2">
    </div>

</div>

</body>
</html>
